<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 加班审批系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🏢 加班审批系统</h1>
        <div class="card">
            <h2>员工注册</h2>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>职级</label>
                    <select name="rank" required>
                        <option value="">请选择职级</option>
                        <option value="CL1">CL1</option>
                        <option value="CL2">CL2</option>
                        <option value="CL3">CL3</option>
                        <option value="CL4">CL4</option>
                        <option value="CL5">CL5</option>
                        <option value="CL6">CL6</option>
                        <option value="CL7">CL7</option>
                        <option value="CL8">CL8</option>
                    </select>
                </div>
                <button type="submit" class="btn">注册</button>
            </form>
            <p class="link">已有账号？<a href="{{ url_for('login') }}">立即登录</a></p>
        </div>
    </div>
</body>
</html>
