<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改申请 - 加班审批系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .date-chip {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid #ddd;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .date-chip:hover {
            border-color: #667eea;
            background: #f0f7ff;
        }
        .date-chip.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 加班审批系统</h1>
            <div class="user-info">
                <a href="{{ url_for('index') }}" class="btn-small">返回</a>
            </div>
        </header>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        
        <div class="card">
            <h2>✏️ 修改申请 - {{ app.batch_name }}</h2>
            
            <form method="POST" action="{{ url_for('edit_application', app_id=app.id) }}">
                <input type="hidden" name="dates" id="dates">
                
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="name" value="{{ app.name }}" required>
                </div>
                
                <div class="form-group">
                    <label>职级</label>
                    <select name="rank" required>
                        <option value="CL1" {% if app.rank == 'CL1' %}selected{% endif %}>CL1</option>
                        <option value="CL2" {% if app.rank == 'CL2' %}selected{% endif %}>CL2</option>
                        <option value="CL3" {% if app.rank == 'CL3' %}selected{% endif %}>CL3</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" name="phone" value="{{ app.phone }}" required>
                </div>
                
                <div class="form-group">
                    <label>点击选择加班日期（可多选）</label>
                    <div id="dateContainer">
                        {% for d in app.batch_dates %}
                        <span class="date-chip {% if d in app.selected_dates %}selected{% endif %}" 
                              onclick="toggleDate('{{ d }}')" 
                              id="date_{{ d }}">{{ d }}</span>
                        {% endfor %}
                    </div>
                    <p class="hint">已选: <span id="selected">{{ app.selected_dates|join(', ') }}</span></p>
                </div>
                
                <div class="form-group">
                    <label>加班理由</label>
                    <textarea name="reason" rows="2" required>{{ app.reason }}</textarea>
                </div>
                
                <div class="form-group">
                    <label>工作内容</label>
                    <textarea name="work_content" rows="3" required>{{ app.work_content }}</textarea>
                </div>
                
                <button type="submit" class="btn" onclick="return submitForm()">保存修改</button>
                <a href="{{ url_for('index') }}" class="btn-small">取消</a>
            </form>
        </div>
        
        <script>
            let selectedDates = {{ app.selected_dates|tojson }};
            
            function toggleDate(date) {
                const index = selectedDates.indexOf(date);
                const chip = document.getElementById('date_' + date);
                
                if (index > -1) {
                    selectedDates.splice(index, 1);
                    chip.classList.remove('selected');
                } else {
                    selectedDates.push(date);
                    chip.classList.add('selected');
                }
                
                updateDisplay();
            }
            
            function updateDisplay() {
                const display = document.getElementById('selected');
                if (selectedDates.length === 0) {
                    display.textContent = '无';
                } else {
                    display.textContent = selectedDates.join(', ');
                }
            }
            
            function submitForm() {
                if (selectedDates.length === 0) {
                    alert('请至少选择一个加班日期');
                    return false;
                }
                document.getElementById('dates').value = JSON.stringify(selectedDates);
                return true;
            }
        </script>
    </div>
</body>
</html>
